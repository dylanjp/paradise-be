spring.application.name=be

# Server Configuration
server.port=8180

# PostgreSQL Database (Production)
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=${DB_DRIVER}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA - Create tables automatically on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
# Requires JWT_SECRET_KEY env var (loaded from .env file via spring-dotenv)
jwt.secret-key=${JWT_SECRET_KEY}
jwt.expiration-time=2592000000

# Notification Cleanup Configuration
# Number of days to retain expired notifications before permanent deletion
notification.cleanup.retention-days=90

# Drive Path Configuration
drive.paths.my-drive=${DRIVE_PATH_MY_DRIVE}
drive.paths.shared-drive=${DRIVE_PATH_SHARED_DRIVE}
drive.paths.admin-drive=${DRIVE_PATH_ADMIN_DRIVE}
drive.paths.media-cache=${DRIVE_PATH_MEDIA_CACHE}
drive.paths.plex-upload=${PLEX_UPLOAD_PATH}

# Drive Cache Configuration
drive.cache.ttl=PT2H
drive.cache.my-drive=false
drive.cache.shared-drive=false
drive.cache.admin-drive=false
drive.cache.media-cache=true
drive.cache.ttl-millis=7200000

# Multipart Upload Configuration (unlimited for large file support)
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1

# Documentation Path Configuration
docs.path=${DOCS_PATH}
